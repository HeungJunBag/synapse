spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000   # 24시간 (ms)

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

server:
  port: 8080
